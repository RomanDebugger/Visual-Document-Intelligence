services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    image: python:3.10-slim
    volumes:
      - ./frontend:/app/frontend
    working_dir: /app
    command: sh -c "pip install streamlit requests pandas && streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - backend
